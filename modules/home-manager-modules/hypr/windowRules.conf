# windowrulev2 = workspace 1 silent,class:^()$
# windowrulev2 = workspace 2 silent,class:^()$
# windowrulev2 = workspace 3 silent,class:^(Simplenote|RemNote|obsidian)$
windowrule = workspace 3 silent, match:class ^(Simplenote|RemNote|obsidian)$
# windowrulev2 = workspace 4 silent,class:^()$
windowrule = workspace 5 silent, match:class ^(keymapp)$
# windowrulev2 = workspace 6 silent,class:^()$
windowrule = workspace 7 silent, match:class ^(discord|wasistlos|Caprine|whatsapp-for-linux|com.rtosta.zapzap|vesktop)$
windowrule = workspace 8 silent, match:class ^(Cider|spotify)$
windowrule = workspace 9 silent, match:class ^([Mm]icrosoft-edge)$
windowrule = workspace 10 silent, match:class ^(1Password|org.prismlauncher.PrismLauncher|Minecraft\* 1\..*|lutris|.+\.exe)$

# Other rules
windowrule = float on, size (monitor_w*0.3) (monitor_h*0.4), move ((monitor_w*0.01)) ((monitor_h*0.57)), match:class ^(org.speedcrunch.)$

windowrule = float on, match:class ^(minesweeper)$

# file explorers
windowrule = float on, match:class ^(nemo|org.gnome.NautilusPreviewer)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:class ^(nemo)$
windowrule = opacity 1 override, match:class ^(zen-beta|zen)$, match:title ^(File Upload|Save As|Save Image)$
windowrule = opacity 1 override, match:class ^(org.gnome.Nautilus)

# set annoying microsoft sign-in as floating windows
windowrule = float on, match:class (), match:title (Sign in to your account)

# zen browser
windowrule = float on, opacity 1 override, match:class ^(zen)$, match:title ^(Library)$

# LLM window
windowrule = workspace 9 silent, match:title ^(Google Gemini - Zen Browser)$, match:class ^(zen)$


# should be opaque (by simple class filter)
windowrule = opacity 1 override, match:class ^(Cider|MuseScore.|soffice|vlc)$

# rule to toggle opacity (does not work)
# windowrulev2 = opacity 1.0 overide,title:(YouTube)
# windowrule = float,title:^(.*)(Youtube)(.*)$

# File save dialogs
windowrule = float on, size (monitor_w*0.6) (monitor_h*0.7), match:class ^(xdg-desktop-portal-gtk)$, match:title ^(All Files)$

# Draw.io
windowrule = opacity 1 override, workspace 5 silent, match:class ^(draw.io)$
windowrule = float on, opacity 1 override, match:class ^(electron)$, match:title ^(Save File|Open File)$

# Zotero
windowrule = workspace 5 silent, match:class ^(Zotero)$
windowrule = opacity 1 override, float on, match:title ^(Zotero Settings)$
windowrule = size (monitor_w*0.4) (monitor_h*0.53), center 1, match:title ^(Zotero Settings)

# dconf-editor
windowrule = float on, center 1, opacity 1 override, size (monitor_w*0.5) (monitor_h*0.6), match:class ^(dconf-editor)$

# NetworkManager
windowrule = float on, center 1, match:class ^(nm-connection-editor)$
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(nm-connection-editor)$, match:title ^(Network Connections)$
windowrule = size (monitor_w*0.5) (monitor_h*0.6), match:class ^(nm-connection-editor)$, match:title ^(Editing)

# Anki
windowrule = workspace 5 silent, match:class ^(Anki)$, match:title (Anki)$
# windowrule = workspace 5 silent, match:class = ^(Anki)$, match:title (User \d{1,2} - Anki) # TODO fix, was:
# windowrulev2 = workspace 5 silent,class:^(Anki)$, title:(User \d{1,2} - Anki)$


windowrule = float on, match:class ^(Anki)$, match:title ^(Add)$
windowrule = opacity 1 override, match:class ^(Anki), match:title ^(Edit Current|Add|Browse.+)$
windowrule = float on, size (monitor_w*0.8) (monitor_h*0.7), center 1, match:class ^(Anki)$, match:title ^(Browse.+|Edit Current)

# Steam
windowrule = float on, match:class ^(steam)$, match:title ^(Steam Settings)$
windowrule = opacity 1 override, match:class ^(steam)$
windowrule = workspace 10 silent, match:class ^(steam)
windowrule = workspace 10 silent, match:title ^(Steam)

# Minecraft
windowrule = fullscreen on, opacity 1 override, match:class ^(Minecraft\* 1\.)

# Firefox
windowrule = float on, opacity 1 override, match:class ^(firefox)$, match:title ^(Library)$

# windowrulev2 = opacity 1 override, 1 override, 1 override, class:^(firefox)$, title:(Youtube)
# windowrulev2 = opacity 0.85 override 0.85 override 1 override, class:^(firefox)$, title:^((?!.*\bYouTube\b).*)$
